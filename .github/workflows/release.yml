name: Release

# Push a version tag (e.g. v0.1.0) and this builds the macOS DMG/zip and
# attaches them to a GitHub Release. The app's in-app update check then points
# users at that release. Easiest flow: `npm run release` (bumps + tags + pushes).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release + upload artifacts

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty is a native addon; electron-builder rebuilds it per target arch.
      - name: Install dependencies
        run: npm ci

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer cert: ship unsigned and let users drag-install.
          # The in-app updater is notify-only, so signing isn't required.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish always

      # electron-builder's GitHub publisher creates the release as a draft with
      # an empty body — its releaseInfo only flows into latest-mac.yml for the
      # in-app updater, not the GitHub release page itself. Fill the body from
      # build/release-notes.md and flip the release out of draft so the tag
      # actually shows up as Latest and the asset URLs are publicly resolvable.
      - name: Publish release (set body + un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --notes-file build/release-notes.md
